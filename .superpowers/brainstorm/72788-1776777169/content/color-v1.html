<h2>配色方案选择</h2>
<p class="subtitle">为主色调选择一个配色方案</p>

<div class="options">
  <div class="option" data-choice="neutral" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>中性灰调</h3>
      <p>#2C2C2C 深灰 + #FAFAFA 浅灰 + #E63946 强调红</p>
    </div>
  </div>
  <div class="option" data-choice="warm" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>暖色系</h3>
      <p>#1D3557 深蓝 + #F1FAEE 米白 + #E63946 珊瑚红</p>
    </div>
  </div>
  <div class="option" data-choice="cool" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>冷色系</h3>
      <p>#264653 深青 + #2A9D8F 青绿 + #E9C46A 金黄</p>
    </div>
  </div>
</div>
