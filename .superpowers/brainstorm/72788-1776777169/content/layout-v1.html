<h2>整体布局选择</h2>
<p class="subtitle">选择适合个人作品集的整体页面布局</p>

<div class="options">
  <div class="option" data-choice="single" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>单栏瀑布流</h3>
      <p>垂直滚动，所有区域按顺序展示，简洁直接</p>
    </div>
  </div>
  <div class="option" data-choice="grid" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>网格仪表板</h3>
      <p>每个区域是独立卡片，网格排列，可自由拖拽排序</p>
    </div>
  </div>
  <div class="option" data-choice="tab" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>标签页切换</h3>
      <p>顶部标签切换不同区域，节省垂直空间</p>
    </div>
  </div>
</div>
