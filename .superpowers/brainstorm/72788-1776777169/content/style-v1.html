<h2>视觉风格选择</h2>
<p class="subtitle">选择你想要的整体视觉风格</p>

<div class="options">
  <div class="option" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>极简主义</h3>
      <p>大量留白，黑白灰为主，内容优先</p>
    </div>
  </div>
  <div class="option" data-choice="vibrant" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>活力彩色</h3>
      <p>渐变色背景，亮色点缀，年轻有活力</p>
    </div>
  </div>
  <div class="option" data-choice="dark" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>深色模式</h3>
      <p>深色背景配亮色文字，科技感强，护眼</p>
    </div>
  </div>
</div>
